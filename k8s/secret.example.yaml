# Your PERSONAL values (from `python setup.py`). The app client_id/secret are baked
# into the image, so they are NOT here. Seal this with kubeseal if you use SealedSecrets.
#
# The refresh token here is only a SEED for the first refresh. After that the server
# rotates it and stores the current one on the PVC (see deployment.yaml). So this value
# going stale in git is expected and harmless as long as the PVC survives.
apiVersion: v1
kind: Secret
metadata:
  name: pcexpress-mcp
  namespace: app-pcexpress
type: Opaque
stringData:
  PCEXPRESS_REFRESH_TOKEN: "REPLACE_WITH_YOUR_REFRESH_TOKEN"
  PCEXPRESS_STORE_ID: "1234"
  PCEXPRESS_BANNER: "zehrs"
  # cart id is auto-discovered from your profile; set PCEXPRESS_CART_ID only to force one.
  # Optional: require a bearer token on the /sse endpoint.
  # PCEXPRESS_MCP_BEARER: "REPLACE_WITH_A_RANDOM_STRING"
