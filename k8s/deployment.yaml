# PC Express MCP in Kubernetes (plain manifests; homelab users deploy the Helm chart instead).
#
# Two auth-specific rules that matter here:
#   1. replicas: 1 — the refresh token is single-use; two pods would knock each other out.
#   2. A PVC mounted at PCEXPRESS_STATE_DIR holds the rotating refresh token. Without a
#      persistent volume, a pod restart loses the rotated token and the seed in the Secret is
#      already spent, so you'd have to re-run the login. This PVC is the load-bearing piece.
#
# The image serves MCP over SSE at /sse (posts to /messages/) and exposes /health for probes.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pcexpress-mcp-state
  namespace: app-pcexpress
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 32Mi
  # storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcexpress-mcp
  namespace: app-pcexpress
spec:
  replicas: 1              # do not scale — single-use refresh token
  strategy:
    type: Recreate         # never run two pods against the same token chain
  selector:
    matchLabels:
      app: pcexpress-mcp
  template:
    metadata:
      labels:
        app: pcexpress-mcp
    spec:
      containers:
        - name: pcexpress-mcp
          image: ghcr.io/fireball1725/pcexpress-mcp:latest   # published by CI on a version tag
          env:
            - name: PCEXPRESS_STATE_DIR
              value: /data
          envFrom:
            - secretRef:
                name: pcexpress-mcp
          ports:
            - name: http
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: state
              mountPath: /data
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: pcexpress-mcp-state
---
apiVersion: v1
kind: Service
metadata:
  name: pcexpress-mcp
  namespace: app-pcexpress
spec:
  selector:
    app: pcexpress-mcp
  ports:
    - port: 80
      targetPort: 8090
